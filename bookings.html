<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Bookings - Sun Beach Palace</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <a href="index.html" class="brand">
        <img src="images/logo.svg" alt="Sun Beach Palace logo" class="logo">
        <span class="brand-name">Sun Beach Palace</span>
      </a>

      <nav class="primary-nav">
        <ul class="main-nav">
          <li><a href="index.html">Home</a></li>
          <li><a href="about.html">About Us</a></li>
          <li><a href="rooms.html">Rooms</a></li>
          <li><a href="activities.html">Activities</a></li>
          <li><a href="resto.html">Restaurants</a></li>
          <li><a href="review.html">Review</a></li>
        </ul>
      </nav>

      <a href="bookings.html" class="cta-button">Book Now</a>
    </div>
  </header>

  <main>
    <h2>Bookings</h2>
    <section class="booking-section">
      <div class="booking-card">
        <h3>Choose your room</h3>
        <form id="booking-form">
          <div class="room-option">
            <input type="radio" id="standard-room-2" name="room" value="Standard Room for 2" data-price="120" checked>
            <label for="standard-room-2">
              <strong>Standard Room for 2</strong>
              <span>Cozy room for two with a queen bed, modern bathroom, and welcoming decor.</span>
              <strong>$120 / night</strong>
            </label>
          </div>
          <div class="room-option">
            <input type="radio" id="standard-room-4" name="room" value="Standard Room for 4" data-price="155">
            <label for="standard-room-4">
              <strong>Standard Room for 4</strong>
              <span>Family-friendly standard room with two double beds and room for four guests.</span>
              <strong>$155 / night</strong>
            </label>
          </div>
          <div class="room-option">
            <input type="radio" id="luxury-room-2" name="room" value="Luxury Room for 2" data-price="190">
            <label for="luxury-room-2">
              <strong>Luxury Room for 2</strong>
              <span>Elegant room for two with premium bedding, seating area, and enhanced amenities.</span>
              <strong>$190 / night</strong>
            </label>
          </div>
          <div class="room-option">
            <input type="radio" id="luxury-room-4" name="room" value="Luxury Room for 4" data-price="235">
            <label for="luxury-room-4">
              <strong>Luxury Room for 4</strong>
              <span>Spacious luxury room with two beds, refined finishes, and extra comfort for four guests.</span>
              <strong>$235 / night</strong>
            </label>
          </div>
          <div class="room-option">
            <input type="radio" id="suite" name="room" value="Suite" data-price="280">
            <label for="suite">
              <strong>Suite</strong>
              <span>Premium suite with separate living space, large bathroom, and panoramic views.</span>
              <strong>$280 / night</strong>
            </label>
          </div>
          <div class="booking-fields">
            <label>
              Nights
              <input type="number" id="room-nights" min="1" value="1">
            </label>
            <label>
              Guests
              <input type="number" id="room-guests" min="1" value="1">
            </label>
          </div>
          <button type="button" id="add-to-payment">Add to payment</button>
        </form>
      </div>

      <aside class="payment-summary">
        <h3>Fake payment</h3>
        <div id="payment-items" class="payment-items">No rooms added yet.</div>
        <div class="payment-total">Total: $<span id="payment-total">0</span></div>
        <button type="button" id="checkout-button" disabled>Checkout</button>
        <p class="payment-note">This is a demo payment page — no real payment is collected.</p>
      </aside>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
